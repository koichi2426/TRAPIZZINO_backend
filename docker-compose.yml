services:
  db:
    # PostGIS入りの公式イメージを使用
    image: kartoza/postgis:15-3.4
    container_name: trapizzino_db
    restart: always
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: trapizzino
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      # ポスグレが接続を受け付けられる状態かを確認
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: trapizzino_app
    working_dir: /app
    ports:
      - "8000:8000"
    env_file:
      - ./app/.env
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
